<!doctype html>
<html lang="nl">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>IFC Calculatietool</title>

  <link rel="stylesheet" href="./style.css">
</head>

<body>
  <main class="app">
    <header class="header">
      <p class="eyebrow">IFC CALCULATIE</p>

      <h1>Trimble Connect modelanalyse</h1>

      <p class="intro">
        Analyseer modellen die reeds in het geopende
        Trimble Connect-project aanwezig zijn.
      </p>
    </header>

    <section class="panel">
      <div id="status" class="status">
        Extensie wordt gestart...
      </div>

      <button id="connect-button" type="button">
        Verbinden met Trimble Connect
      </button>

      <section id="project-card" class="project-card" hidden>
        <h2>Actief project</h2>

        <dl>
          <div>
            <dt>Naam</dt>
            <dd id="project-name">—</dd>
          </div>

          <div>
            <dt>Project-ID</dt>
            <dd id="project-id">—</dd>
          </div>

          <div>
            <dt>Regio</dt>
            <dd id="project-region">—</dd>
          </div>
        </dl>
      </section>

      <details class="debug">
        <summary>Technische gegevens</summary>
        <pre id="result">Nog geen gegevens.</pre>
      </details>
    </section>
  </main>

  <script
    src="https://components.connect.trimble.com/trimble-connect-workspace-api/index.js"
  ></script>

  <script src="./app.js"></script>
</body>
</html>
