<!doctype html>
<html lang="nl">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>IFC Calculatietool</title>

  <link rel="stylesheet" href="./style.css">
</head>

<body>
  <main class="app">
    <header class="header">
      <p class="eyebrow">IFC CALCULATIE</p>

      <h1>Trimble Connect modelanalyse</h1>

      <p class="intro">
        Analyseer het actieve model in de Trimble Connect Viewer.
      </p>
    </header>

    <section class="panel">
      <div id="status" class="status">
        Extensie wordt gestart...
      </div>

      <button id="connect-button" type="button">
        Verbinden met Trimble Connect
      </button>

      <section id="model-card" class="card" hidden>
        <h2>Actief model</h2>

        <p id="active-model-name" class="active-model-name">
          Geen actief model gevonden.
        </p>

        <button id="analyse-button" type="button">
          Analyseer actief model
        </button>
      </section>

      <section id="analysis-card" class="card" hidden>
        <div class="section-heading">
          <div>
            <h2>Modelanalyse</h2>
            <p id="analysis-summary" class="muted"></p>
          </div>
        </div>

        <div id="analysis-progress" class="progress" hidden>
          <div class="spinner"></div>
          <span>Objecten worden uitgelezen...</span>
        </div>

        <div id="categories-list" class="categories-list"></div>

        <details id="other-classes-details" class="other-classes" hidden>
          <summary>Andere IFC-klassen</summary>
          <div id="other-classes-list"></div>
        </details>
      </section>

      <details class="debug">
        <summary>Technische gegevens</summary>
        <pre id="result">Nog geen gegevens.</pre>
      </details>
    </section>
  </main>

  <script
    src="https://components.connect.trimble.com/trimble-connect-workspace-api/index.js"
  ></script>

  <script>
    const statusElement = document.getElementById("status");
    const connectButton = document.getElementById("connect-button");
    const resultElement = document.getElementById("result");

    const modelCard = document.getElementById("model-card");
    const activeModelName = document.getElementById("active-model-name");
    const analyseButton = document.getElementById("analyse-button");

    const analysisCard = document.getElementById("analysis-card");
    const analysisSummary = document.getElementById("analysis-summary");
    const analysisProgress = document.getElementById("analysis-progress");
    const categoriesList = document.getElementById("categories-list");

    const otherClassesDetails = document.getElementById(
      "other-classes-details"
    );

    const otherClassesList = document.getElementById(
      "other-classes-list"
    );

    let workspaceApi = null;
    let activeModel = null;
    let isConnecting = false;
    let isAnalysing = false;

    const categoryDefinitions = [
      {
        key: "walls",
        label: "Wanden",
        icon: "▥",
        classes: [
          "IfcWall",
          "IfcWallStandardCase",
          "Wall",
          "WallStandardCase"
        ]
      },
      {
        key: "floors",
        label: "Vloeren en platen",
        icon: "▰",
        classes: [
          "IfcSlab",
          "Slab",
          "Floor"
        ]
      },
      {
        key: "roofs",
        label: "Daken",
        icon: "⌂",
        classes: [
          "IfcRoof",
          "Roof"
        ]
      },
      {
        key: "beams",
        label: "Liggers",
        icon: "▬",
        classes: [
          "IfcBeam",
          "Beam"
        ]
      },
      {
        key: "columns",
        label: "Kolommen",
        icon: "▮",
        classes: [
          "IfcColumn",
          "Column"
        ]
      },
      {
        key: "foundations",
        label: "Funderingen",
        icon: "▱",
        classes: [
          "IfcFooting",
          "IfcPile",
          "Footing",
          "Pile"
        ]
      },
      {
        key: "doors",
        label: "Deuren",
        icon: "▯",
        classes: [
          "IfcDoor",
          "Door"
        ]
      },
      {
        key: "windows",
        label: "Ramen",
        icon: "▦",
        classes: [
          "IfcWindow",
          "Window"
        ]
      },
      {
        key: "coverings",
        label: "Afwerkingen en plafonds",
        icon: "▤",
        classes: [
          "IfcCovering",
          "Covering",
          "Ceiling"
        ]
      },
      {
        key: "stairs",
        label: "Trappen",
        icon: "▟",
        classes: [
          "IfcStair",
          "IfcStairFlight",
          "Stair",
          "StairFlight"
        ]
      },
      {
        key: "members",
        label: "Profielen en onderdelen",
        icon: "╫",
        classes: [
          "IfcMember",
          "IfcPlate",
          "Member",
          "Plate"
        ]
      },
      {
        key: "spaces",
        label: "Ruimtes",
        icon: "□",
        classes: [
          "IfcSpace",
          "Space"
        ]
      }
    ];

    connectButton.addEventListener("click", connectToTrimble);
    analyseButton.addEventListener("click", analyseActiveModel);

    window.addEventListener("load", () => {
      if (window.parent !== window) {
        connectToTrimble();
      } else {
        setStatus(
          "De website werkt. Open deze pagina als extensie binnen Trimble Connect.",
          "warning"
        );
      }
    });

    async function connectToTrimble() {
      if (isConnecting) {
        return;
      }

      isConnecting = true;
      connectButton.disabled = true;

      setStatus("Bezig met verbinden met Trimble Connect...");

      try {
        if (!window.TrimbleConnectWorkspace) {
          throw new Error(
            "De Trimble Connect Workspace API werd niet geladen."
          );
        }

        workspaceApi =
          await window.TrimbleConnectWorkspace.connect(
            window.parent,
            handleTrimbleEvent,
            30000
          );

        setStatus(
          "Verbinding met Trimble Connect geslaagd.",
          "success"
        );

        await loadActiveModel();
      } catch (error) {
        console.error("Verbindingsfout:", error);

        setStatus(
          "Geen verbinding. Open de tool als extensie in de Trimble Connect 3D Viewer.",
          "error"
        );

        showDebug({
          connected: false,
          error: getErrorMessage(error)
        });
      } finally {
        connectButton.disabled = false;
        isConnecting = false;
      }
    }

    async function loadActiveModel() {
      if (!workspaceApi) {
        return;
      }

      try {
        const models = await workspaceApi.viewer.getModels();
        const modelList = Array.isArray(models) ? models : [];

        activeModel =
          modelList.find(model => isActiveModel(model)) ||
          modelList.find(model => isLoadedModel(model)) ||
          modelList[0] ||
          null;

        modelCard.hidden = false;

        if (!activeModel) {
          activeModelName.textContent =
            "Geen actief of geladen model gevonden.";

          analyseButton.disabled = true;

          setStatus(
            "Open of activeer eerst een model in de 3D Viewer.",
            "warning"
          );

          showDebug({
            connected: true,
            models: modelList,
            activeModel: null
          });

          return;
        }

        activeModelName.textContent =
          activeModel.name ||
          activeModel.title ||
          "Naamloos model";

        analyseButton.disabled = false;

        showDebug({
          connected: true,
          activeModel
        });
      } catch (error) {
        console.error("Actief model kon niet worden bepaald:", error);

        setStatus(
          "Het actieve model kon niet worden bepaald.",
          "error"
        );

        showDebug({
          connected: true,
          activeModelLoaded: false,
          error: getErrorMessage(error)
        });
      }
    }

    async function analyseActiveModel() {
      if (!workspaceApi || !activeModel || isAnalysing) {
        return;
      }

      isAnalysing = true;
      analyseButton.disabled = true;
      analysisCard.hidden = false;
      analysisProgress.hidden = false;
      categoriesList.innerHTML = "";
      otherClassesDetails.hidden = true;

      setStatus("Het actieve model wordt geanalyseerd...");

      try {
        const modelObjects =
          await workspaceApi.viewer.getObjects();

        const allGroups = Array.isArray(modelObjects)
          ? modelObjects
          : [];

        const activeModelId = String(
          activeModel.id ||
          activeModel.modelId ||
          ""
        );

        const activeGroup = allGroups.find(group => {
          const groupModelId = String(
            group.modelId ||
            group.id ||
            ""
          );

          return groupModelId === activeModelId;
        });

        const selectedGroups = activeGroup
          ? [activeGroup]
          : [];

        if (selectedGroups.length === 0) {
          throw new Error(
            "Er werden geen objecten gevonden voor het actieve model."
          );
        }

        const analysis = buildAnalysis(selectedGroups);

        renderAnalysis(analysis);

        setStatus(
          "Analyse van het actieve model voltooid.",
          "success"
        );

        showDebug({
          activeModel,
          analysis,
          matchingGroup: activeGroup
        });
      } catch (error) {
        console.error("Analyse mislukt:", error);

        setStatus(
          "De modelanalyse is mislukt. Bekijk de technische gegevens.",
          "error"
        );

        analysisSummary.textContent =
          "Analyse kon niet worden uitgevoerd.";

        showDebug({
          analysisCompleted: false,
          activeModel,
          error: getErrorMessage(error)
        });
      } finally {
        analysisProgress.hidden = true;
        analyseButton.disabled = false;
        isAnalysing = false;
      }
    }

    function buildAnalysis(modelGroups) {
      const categoryCounts = {};
      const classCounts = {};
      let totalObjects = 0;

      categoryDefinitions.forEach(category => {
        categoryCounts[category.key] = {
          label: category.label,
          icon: category.icon,
          count: 0,
          classes: {}
        };
      });

      modelGroups.forEach(modelGroup => {
        const objects = Array.isArray(modelGroup.objects)
          ? modelGroup.objects
          : [];

        objects.forEach(object => {
          totalObjects += 1;

          const className = determineObjectClass(object);
          const category = findCategory(className);

          classCounts[className] =
            (classCounts[className] || 0) + 1;

          if (category) {
            const target = categoryCounts[category.key];

            target.count += 1;
            target.classes[className] =
              (target.classes[className] || 0) + 1;
          }
        });
      });

      const otherClasses = Object.entries(classCounts)
        .filter(([className]) => !findCategory(className))
        .sort((a, b) => b[1] - a[1]);

      return {
        totalObjects,
        categories: Object.values(categoryCounts)
          .filter(category => category.count > 0)
          .sort((a, b) => b.count - a.count),
        otherClasses
      };
    }

    function renderAnalysis(analysis) {
      analysisSummary.textContent =
        analysis.totalObjects.toLocaleString("nl-BE") +
        " objecten onderzocht.";

      if (analysis.categories.length === 0) {
        categoriesList.innerHTML = `
          <div class="empty-state">
            Er werden nog geen herkenbare bouwcategorieën gevonden.
          </div>
        `;
      } else {
        categoriesList.innerHTML = analysis.categories
          .map(category => {
            const classText = Object.entries(category.classes)
              .sort((a, b) => b[1] - a[1])
              .map(([className, count]) => {
                return `
                  <span>
                    ${escapeHtml(className)}:
                    ${count.toLocaleString("nl-BE")}
                  </span>
                `;
              })
              .join("");

            return `
              <article class="category-card">
                <div class="category-icon">
                  ${escapeHtml(category.icon)}
                </div>

                <div class="category-content">
                  <h3>${escapeHtml(category.label)}</h3>

                  <div class="category-classes">
                    ${classText}
                  </div>
                </div>

                <strong class="category-count">
                  ${category.count.toLocaleString("nl-BE")}
                </strong>
              </article>
            `;
          })
          .join("");
      }

      if (analysis.otherClasses.length > 0) {
        otherClassesDetails.hidden = false;

        otherClassesList.innerHTML = analysis.otherClasses
          .map(([className, count]) => {
            return `
              <div class="other-class-row">
                <span>${escapeHtml(className)}</span>
                <strong>${count.toLocaleString("nl-BE")}</strong>
              </div>
            `;
          })
          .join("");
      }
    }

    function determineObjectClass(object) {
      return (
        object?.class ||
        object?.product?.objectType ||
        object?.product?.name ||
        "Onbekende klasse"
      );
    }

    function findCategory(className) {
      const normalizedClass = normalizeText(className);

      return categoryDefinitions.find(category =>
        category.classes.some(candidate => {
          const normalizedCandidate = normalizeText(candidate);

          return (
            normalizedClass === normalizedCandidate ||
            normalizedClass.includes(normalizedCandidate) ||
            normalizedCandidate.includes(normalizedClass)
          );
        })
      );
    }

    function isActiveModel(model) {
      const state = normalizeText(model?.state);

      return (
        state.includes("active") ||
        model?.active === true ||
        model?.isActive === true ||
        model?.selected === true
      );
    }

    function isLoadedModel(model) {
      const state = normalizeText(model?.state);

      return (
        state.includes("loaded") ||
        state.includes("visible")
      );
    }

    function normalizeText(value) {
      return String(value || "")
        .trim()
        .toLowerCase()
        .replaceAll(" ", "")
        .replaceAll("_", "")
        .replaceAll("-", "");
    }

    function handleTrimbleEvent(event, data) {
      console.log("Trimble Connect event:", event, data);

      if (
        event === "viewer.onModelStateChanged" ||
        event === "viewer.modelStateChanged"
      ) {
        loadActiveModel();
      }

      if (
        event === "extension.sessionInvalid" ||
        event === "embed.session.invalid"
      ) {
        setStatus(
          "De Trimble Connect-sessie is niet meer geldig.",
          "error"
        );
      }
    }

    function setStatus(message, type = "") {
      statusElement.textContent = message;
      statusElement.className = "status";

      if (type) {
        statusElement.classList.add(type);
      }
    }

    function showDebug(data) {
      resultElement.textContent = JSON.stringify(
        data,
        null,
        2
      );
    }

    function getErrorMessage(error) {
      if (error instanceof Error) {
        return error.message;
      }

      return String(error);
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
  </script>
</body>
</html>
